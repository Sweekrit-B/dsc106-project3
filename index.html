<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>cVeg D3 Evolution Maps</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="app">
		<h1>cVeg Anomaly Evolution (D3 + CMIP6 Zarr)</h1>

		<div class="toolbar">
			<button id="load-button" type="button">Load & Compute</button>
			<label class="control" for="coarsen-input">
				<span>Coarsening</span>
				<input id="coarsen-input" type="number" min="1" step="1" value="2" />
			</label>
			<label class="control" for="year-agg-input">
				<span>Year aggregation</span>
				<input id="year-agg-input" type="number" min="1" step="1" value="5" />
			</label>
			<label class="control" for="viewport-select">
				<span>Focus region</span>
				<select id="viewport-select">
					<option value="global">Global</option>
					<option value="south-america">South America</option>
					<option value="north-america">North America</option>
					<option value="europe">Europe</option>
					<option value="africa">Africa</option>
					<option value="asia">Asia</option>
					<option value="oceania">Oceania</option>
				</select>
			</label>
			<input id="year-slider" type="range" min="0" max="0" step="1" value="0" disabled />
			<div id="year-label">Year: --</div>
		</div>

		<p id="status">Click “Load & Compute” to start.</p>

		<section class="legend-wrap">
			<svg id="legend-svg" aria-label="Shared anomaly legend"></svg>
		</section>

		<section class="map-grid" id="map-grid">
			<article class="map-card" data-scenario="SSP245">
				<h2>SSP245</h2>
				<canvas class="map-canvas" id="canvas-ssp245"></canvas>
				<div class="tooltip"></div>
			</article>
			<article class="map-card" data-scenario="SSP370">
				<h2>SSP370</h2>
				<canvas class="map-canvas" id="canvas-ssp370"></canvas>
				<div class="tooltip"></div>
			</article>
			<article class="map-card" data-scenario="SSP585">
				<h2>SSP585</h2>
				<canvas class="map-canvas" id="canvas-ssp585"></canvas>
				<div class="tooltip"></div>
			</article>
		</section>
	</main>

	<script type="module" src="./index.js"></script>
</body>
</html>
