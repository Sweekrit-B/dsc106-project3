<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>cVeg D3 Evolution Maps</title>
	<style>
		:root {
			--bg: #f7f4ee;
			--panel: #fffef8;
			--ink: #202a30;
			--muted: #55656d;
			--accent: #0f6f73;
			--ocean: #d6ecf2;
			--ok: #2f8b57;
			--warn: #b45e20;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 15% 10%, #e5f3e4 0%, transparent 48%),
				radial-gradient(circle at 82% 90%, #f9e7d8 0%, transparent 55%),
				var(--bg);
			min-height: 100vh;
			padding: 1.25rem;
		}

		.app {
			max-width: 1280px;
			margin: 0 auto;
			background: var(--panel);
			border: 1px solid #ddd6c9;
			border-radius: 16px;
			box-shadow: 0 10px 30px rgba(32, 42, 48, 0.08);
			padding: 1rem;
		}

		h1 {
			margin: 0;
			font-size: 1.6rem;
		}

		.subtitle {
			color: var(--muted);
			margin: 0.35rem 0 0.8rem;
		}

		.toolbar {
			display: grid;
			grid-template-columns: auto auto auto 1fr auto;
			gap: 0.75rem;
			align-items: center;
			margin-bottom: 1rem;
		}

		.control {
			display: grid;
			gap: 0.25rem;
			font-size: 0.82rem;
			color: var(--muted);
		}

		.control input {
			width: 96px;
			padding: 0.5rem 0.55rem;
			border: 1px solid #cfc7ba;
			border-radius: 8px;
			font: inherit;
			color: var(--ink);
			background: #fff;
		}

		#load-button {
			border: 0;
			border-radius: 10px;
			padding: 0.64rem 0.95rem;
			color: #fff;
			background: var(--accent);
			font-weight: 600;
			cursor: pointer;
		}

		#year-slider {
			width: 100%;
		}

		#year-label {
			font-weight: 700;
			min-width: 78px;
			text-align: right;
		}

		#status {
			color: var(--muted);
			margin: 0 0 0.75rem;
		}

		#status.status-ok {
			color: var(--ok);
		}

		#status.status-warn {
			color: var(--warn);
		}

		.legend-wrap {
			margin-bottom: 0.9rem;
			border: 1px solid #e1dbcf;
			border-radius: 10px;
			padding: 0.65rem;
			background: #fff;
		}

		#legend-svg {
			width: 100%;
			height: 56px;
			display: block;
		}

		.map-grid {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 0.9rem;
		}

		.map-card {
			background: #fff;
			border: 1px solid #e0dacc;
			border-radius: 12px;
			padding: 0.65rem;
			position: relative;
		}

		.map-card h2 {
			margin: 0 0 0.45rem;
			font-size: 0.98rem;
			letter-spacing: 0.03em;
		}

		.map-canvas {
			width: 100%;
			aspect-ratio: 2 / 1;
			background: #8ecae6;
			border-radius: 0;
			display: block;
			image-rendering: pixelated;
			image-rendering: crisp-edges;
		}

		.tooltip {
			position: absolute;
			pointer-events: none;
			opacity: 0;
			background: rgba(24, 33, 36, 0.9);
			color: #fff;
			border-radius: 6px;
			padding: 0.38rem 0.48rem;
			font-size: 0.78rem;
			transform: translate(10px, -90%);
			white-space: nowrap;
		}

		@media (max-width: 1020px) {
			.map-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main class="app">
		<h1>cVeg Anomaly Evolution (D3 + CMIP6 Zarr)</h1>
		<p class="subtitle">
			Replicates your Python pipeline in JavaScript: choose the coarsening factor and
			year aggregation, then compute the SSP anomaly maps in-browser.
		</p>

		<div class="toolbar">
			<button id="load-button" type="button">Load & Compute</button>
			<label class="control" for="coarsen-input">
				<span>Coarsening</span>
				<input id="coarsen-input" type="number" min="1" step="1" value="2" />
			</label>
			<label class="control" for="year-agg-input">
				<span>Year aggregation</span>
				<input id="year-agg-input" type="number" min="1" step="1" value="5" />
			</label>
			<input id="year-slider" type="range" min="0" max="0" step="1" value="0" disabled />
			<div id="year-label">Year: --</div>
		</div>

		<p id="status">Click “Load & Compute” to start.</p>

		<section class="legend-wrap">
			<svg id="legend-svg" aria-label="Shared anomaly legend"></svg>
		</section>

		<section class="map-grid" id="map-grid">
			<article class="map-card" data-scenario="SSP245">
				<h2>SSP245</h2>
				<canvas class="map-canvas" id="canvas-ssp245"></canvas>
				<div class="tooltip"></div>
			</article>
			<article class="map-card" data-scenario="SSP370">
				<h2>SSP370</h2>
				<canvas class="map-canvas" id="canvas-ssp370"></canvas>
				<div class="tooltip"></div>
			</article>
			<article class="map-card" data-scenario="SSP585">
				<h2>SSP585</h2>
				<canvas class="map-canvas" id="canvas-ssp585"></canvas>
				<div class="tooltip"></div>
			</article>
		</section>
	</main>

	<script type="module" src="./index.js"></script>
</body>
</html>
